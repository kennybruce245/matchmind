<!DOCTYPE html>
<html>
<head>
    <title>Mietech LTD - House Price Prediction</title>

    <style>
        body {
            font-family: Arial;
            background: #0b0f1a;
            color: white;
            text-align: center;
            margin-top: 60px;
        }

        h1 {
            color: #00ffd5;
        }

        input {
            padding: 12px;
            margin: 10px;
            width: 250px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 12px 25px;
            background: #00ffd5;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .card {
            margin-top: 25px;
            padding: 20px;
            background: #111827;
            display: inline-block;
            border-radius: 12px;
            box-shadow: 0 0 20px #00ffd5;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

    <h1>🏠 Mietech LTD</h1>
    <p>House Price Prediction System</p>

    <form method="POST">

        <input name="location" placeholder="Location (Gasabo)" required>
        <input name="sqft" placeholder="Square Footage" required>
        <input name="rooms" placeholder="Number of Rooms" required>

        <br><br>

        <button type="submit">Predict Price</button>
    </form>

    {% if prediction %}
        <div class="card">
            Predicted Price: {{ prediction }}
        </div>
    {% endif %}

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

</body>
</html>
